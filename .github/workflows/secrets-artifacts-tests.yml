name: Secrets Artifacts and Tests

on:
  push:
  workflow_dispatch:

jobs:
  test-and-upload:
    runs-on: ubuntu-latest
    env:
      MY_SECRET_MESSAGE: ${{ secrets.MY_SECRET_MESSAGE }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check whether secret is set
        run: |
          if [ -n "$MY_SECRET_MESSAGE" ]; then
            echo "The secret is set: true"
          else
            echo "The secret is set: false"
          fi

      - name: Demonstrate secret masking
        run: |
          echo "GitHub masks direct secret output as: $MY_SECRET_MESSAGE"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -q

      - name: Generate test report
        run: |
          mkdir -p reports
          {
            echo "Test report"
            echo "Workflow: $GITHUB_WORKFLOW"
            echo "Run ID: $GITHUB_RUN_ID"
            echo "Commit: $GITHUB_SHA"
            echo "Result: tests passed"
          } > reports/test-report.txt

      - name: Upload test report artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: reports/test-report.txt

  consume-artifact:
    needs: test-and-upload
    runs-on: ubuntu-latest
    steps:
      - name: Download test report artifact
        uses: actions/download-artifact@v4
        with:
          name: test-report
          path: downloaded-report

      - name: Print downloaded report
        run: cat downloaded-report/test-report.txt

